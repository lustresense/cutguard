name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/build_adapters.py --check
      - run: python scripts/validate_repo.py
      - run: python scripts/validate_benchmark_results.py
      - run: python -m unittest discover -s tests
      - run: python scripts/package_release.py --version 0.1.0 --out dist
