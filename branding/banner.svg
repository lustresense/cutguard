<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1B2C47" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="#0F1B2E"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <text x="60" y="70" font-family="'Courier New', monospace" font-size="15" letter-spacing="3" fill="#7C93B3">AGENT SKILL &#183; RISK-LOCKED REFACTORING</text>

  <text x="58" y="168" font-family="'Courier New', monospace" font-weight="bold" font-size="78" letter-spacing="2" fill="#E4EDF7">CUTGUARD</text>

  <text x="62" y="205" font-family="'Courier New', monospace" font-size="22" fill="#C9A227">Cut code, not corners.</text>

