  </g>
  <line x1="788" y1="38" x2="1008" y2="148" stroke="#E85D4C" stroke-width="3" stroke-dasharray="12 8" stroke-linecap="round"/>

  <path d="M 1050 195 A 27 27 0 0 1 1102 195" fill="none" stroke="#C9A227" stroke-width="9" stroke-linecap="round"/>
  <rect x="1029" y="195" width="94" height="76" rx="10" fill="#0F1B2E" stroke="#C9A227" stroke-width="5"/>
  <circle cx="1076" cy="226" r="7" fill="#C9A227"/>
  <rect x="1073" y="231" width="6" height="16" fill="#C9A227"/>

  <text x="1029" y="292" font-family="'Courier New', monospace" font-size="13" letter-spacing="3" fill="#C9A227">LOCKED</text>
