<svg viewBox="0 0 820 1120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1B2C47" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="820" height="1120" fill="#0F1B2E"/>
  <rect width="820" height="1120" fill="url(#grid)"/>

  <text x="60" y="58" font-family="'Courier New', monospace" font-weight="bold" font-size="28" fill="#E4EDF7">THE CUTGUARD METHOD</text>
  <text x="60" y="86" font-family="'Courier New', monospace" font-size="14.5" fill="#7C93B3">Risk is classified before code is minimized. One stage cannot be cut.</text>

  <!-- spine -->
  <line x1="110" y1="140" x2="110" y2="1000" stroke="#3A4E70" stroke-width="2" stroke-dasharray="3 7"/>
  <line x1="110" y1="450" x2="110" y2="570" stroke="#C9A227" stroke-width="4"/>

  <!-- stage 1 -->
  <circle cx="110" cy="160" r="20" fill="#0F1B2E" stroke="#E4EDF7" stroke-width="3"/>
  <text x="110" y="167" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#E4EDF7">1</text>
  <rect x="160" y="116" width="600" height="88" rx="8" fill="#142440" stroke="#24334F" stroke-width="1"/>
  <text x="185" y="152" font-family="'Courier New', monospace" font-weight="bold" font-size="19" fill="#E4EDF7">Understand</text>
  <text x="185" y="177" font-family="Arial, sans-serif" font-size="13.5" fill="#93A8C6">Read the code, data flow, and existing project instructions before acting.</text>

  <!-- stage 2 -->
  <circle cx="110" cy="280" r="20" fill="#0F1B2E" stroke="#E4EDF7" stroke-width="3"/>
  <text x="110" y="287" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#E4EDF7">2</text>
  <rect x="160" y="236" width="600" height="88" rx="8" fill="#142440" stroke="#24334F" stroke-width="1"/>
  <text x="185" y="272" font-family="'Courier New', monospace" font-weight="bold" font-size="19" fill="#E4EDF7">Classify risk</text>
  <text x="185" y="297" font-family="Arial, sans-serif" font-size="13.5" fill="#93A8C6">Mark the change: low risk, trust-boundary, or high impact.</text>

  <!-- stage 3: LOCKED -->
  <circle cx="110" cy="400" r="24" fill="#C9A227" stroke="#C9A227" stroke-width="3"/>
  <path d="M 100 396 A 10 10 0 0 1 120 396" fill="none" stroke="#0F1B2E" stroke-width="3" stroke-linecap="round"/>
  <rect x="98" y="396" width="24" height="16" rx="2" fill="#0F1B2E"/>
  <rect x="160" y="352" width="600" height="96" rx="8" fill="#1E2A18" stroke="#C9A227" stroke-width="2"/>
  <text x="185" y="392" font-family="'Courier New', monospace" font-weight="bold" font-size="19" fill="#C9A227">Lock invariants</text>
  <text x="185" y="417" font-family="Arial, sans-serif" font-size="13.5" fill="#D8C98A">Name the guards this boundary requires. These do not get cut.</text>
  <rect x="668" y="362" width="76" height="26" rx="13" fill="#C9A227"/>
  <text x="706" y="379" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="11" letter-spacing="1" fill="#0F1B2E">LOCKED</text>

  <!-- stage 4 -->
  <circle cx="110" cy="520" r="20" fill="#0F1B2E" stroke="#E4EDF7" stroke-width="3"/>
  <text x="110" y="527" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#E4EDF7">4</text>
  <rect x="160" y="476" width="600" height="88" rx="8" fill="#142440" stroke="#24334F" stroke-width="1"/>
  <text x="185" y="512" font-family="'Courier New', monospace" font-weight="bold" font-size="19" fill="#E4EDF7">Challenge necessity</text>
  <text x="185" y="537" font-family="Arial, sans-serif" font-size="13.5" fill="#93A8C6">Ask whether the feature, endpoint, or abstraction needs to exist at all.</text>

  <!-- stage 5 -->
  <circle cx="110" cy="640" r="20" fill="#0F1B2E" stroke="#E4EDF7" stroke-width="3"/>
  <text x="110" y="647" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#E4EDF7">5</text>
  <rect x="160" y="596" width="600" height="88" rx="8" fill="#142440" stroke="#24334F" stroke-width="1"/>
  <text x="185" y="632" font-family="'Courier New', monospace" font-weight="bold" font-size="19" fill="#E4EDF7">Reuse before writing</text>
  <text x="185" y="657" font-family="Arial, sans-serif" font-size="13.5" fill="#93A8C6">Existing code &#8594; standard library &#8594; platform &#8594; dependency &#8594; new code.</text>

  <!-- stage 6 -->
  <circle cx="110" cy="760" r="20" fill="#0F1B2E" stroke="#E4EDF7" stroke-width="3"/>
  <text x="110" y="767" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#E4EDF7">6</text>
  <rect x="160" y="716" width="600" height="88" rx="8" fill="#142440" stroke="#24334F" stroke-width="1"/>
  <text x="185" y="752" font-family="'Courier New', monospace" font-weight="bold" font-size="19" fill="#E4EDF7">Implement the smallest secure solution</text>
  <text x="185" y="777" font-family="Arial, sans-serif" font-size="13.5" fill="#93A8C6">The narrowest diff that satisfies the task and every locked invariant.</text>

  <!-- stage 7 -->
  <circle cx="110" cy="880" r="20" fill="#0F1B2E" stroke="#E4EDF7" stroke-width="3"/>
  <text x="110" y="887" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#E4EDF7">7</text>
  <rect x="160" y="836" width="600" height="88" rx="8" fill="#142440" stroke="#24334F" stroke-width="1"/>
  <text x="185" y="872" font-family="'Courier New', monospace" font-weight="bold" font-size="19" fill="#E4EDF7">Attack negative paths</text>
  <text x="185" y="897" font-family="Arial, sans-serif" font-size="13.5" fill="#93A8C6">Test unauthenticated, cross-user, malformed, and abuse cases.</text>

  <!-- stage 8 -->
  <circle cx="110" cy="1000" r="20" fill="#0F1B2E" stroke="#E4EDF7" stroke-width="3"/>
  <text x="110" y="1007" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="18" fill="#E4EDF7">8</text>
  <rect x="160" y="956" width="600" height="88" rx="8" fill="#142440" stroke="#24334F" stroke-width="1"/>
  <text x="185" y="992" font-family="'Courier New', monospace" font-weight="bold" font-size="19" fill="#E4EDF7">Report evidence</text>
  <text x="185" y="1017" font-family="Arial, sans-serif" font-size="13.5" fill="#93A8C6">State what changed, what was actually verified, and what remains uncertain.</text>

  <text x="160" y="1075" font-family="'Courier New', monospace" font-size="13" fill="#7C93B3">github.com/lustresense/cutguard</text>
</svg>
